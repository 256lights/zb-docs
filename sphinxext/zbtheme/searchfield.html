{# id="searchbox" used by JavaScript. #}
{%- if pagename != "search" and builder != "singlehtml" %}
<search
  id="searchbox"
  class="my-4 text-sm noscript:hidden"
>
  <form
    action="{{ pathto('search') }}"
    method="get"
    class="flex flex-row items-stretch w-full"
  >
    <input
      type="search"
      name="q"
      class="flex-1 min-w-px ps-4 pe-1 py-1 border-s border-y border-[#ccc] rounded-s-full"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="Search"
    >
    <input
      type="submit"
      class="bg-[rgb(233,233,237)] ps-2 pe-3 py-1 border border-[#ccc] rounded-e-full"
      value="{{ _('Go') }}"
    >
  </form>
</search>
{%- endif %}
