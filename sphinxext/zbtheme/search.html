{%- extends "basic/search.html" %}

{%- block searchbox %}
  <form
    action=""
    method="get"
    class="flex flex-row gap-2 w-full max-w-xs"
  >
    <input
      type="text"
      name="q"
      aria-labelledby="search-documentation"
      class="flex-1 min-w-px p-1 border border-[#ccc]"
      value=""
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
    <input
      type="submit"
      value="{{ _('search') }}"
      class="bg-[rgb(233,233,237)] p-1 border border-[#ccc]"
    >
    <span id="search-progress" class="ps-2"></span>
  </form>
{%- endblock %}
